id: v1-ch10-s05-relativistic-momentum
title: Relativistic Momentum in SI Units
chapter: "10 Conservation of Momentum"
section: "10-5 Relativistic momentum"
archetype: relativistic-momentum
summary: >
  SI-domain relativistic momentum with beta overlays, low-beta approximation,
  and benchmark residual gates.
controls:
  - id: mass
    label: mass
    type: range
    min: 0.1
    max: 10.0
    step: 0.1
    default: 1.0
  - id: vMax
    label: max velocity (m/s)
    type: range
    min: 1000000
    max: 293796608
    step: 1000000
    default: 284802835
  - id: vProbe
    label: probe velocity (m/s)
    type: range
    min: 1000000
    max: 293796608
    step: 1000000
    default: 224844344
metrics:
  - id: beta_probe
    label: Probe beta
  - id: p_classical
    label: Classical momentum
  - id: p_relativistic
    label: Relativistic momentum
  - id: relative_error_pct
    label: Classical underestimation (%)
  - id: formula_residual_pct
    label: SI residual vs formula (%)
  - id: dataset_residual_sigma
    label: Dataset residual (sigma RMS)
assertions:
  - when: calibrated beta band
    expect: SI formula residual <= 2%
