id: v1-ch10-s03-momentum-is-conserved
title: Recoil Momentum in a Finite Release Window (SI)
chapter: "10 Conservation of Momentum"
section: "10-3 Momentum is conserved!"
archetype: recoil
summary: >
  Finite-duration recoil impulse pair with pre-wall validation window and
  apparatus imperfection controls.
controls:
  - id: mass
    label: cart mass
    type: range
    min: 0.2
    max: 4.0
    step: 0.05
    default: 1.0
  - id: releaseImpulse
    label: release impulse
    type: range
    min: 0.02
    max: 0.8
    step: 0.01
    default: 0.28
  - id: releaseDuration
    label: release duration
    type: range
    min: 0.01
    max: 0.3
    step: 0.005
    default: 0.08
  - id: asymmetry
    label: release asymmetry
    type: range
    min: -0.2
    max: 0.2
    step: 0.005
    default: 0.0
  - id: fixtureFriction
    label: fixture friction
    type: range
    min: 0.0
    max: 0.25
    step: 0.005
    default: 0.0
metrics:
  - id: momentum_drift_norm
    label: Momentum drift (pre-wall)
  - id: com_drift_norm
    label: COM drift / track length
  - id: energy_window_ratio
    label: Pre-wall energy window ratio
  - id: dataset_residual_sigma
    label: Dataset residual (sigma RMS)
assertions:
  - when: calibrated symmetric release
    expect: momentum drift <= 1% and COM drift <= 0.5% track length
